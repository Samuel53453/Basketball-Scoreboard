<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div>
                <h3 class="side">HOME</h3>
                <div class="scoreboard">
                    <p class="score" id="home-score">0</p>
                </div>
                <div class="points">
                    <p class="point-adder" onclick="onePointHome()">+1</p>
                    <p class="point-adder" onclick="twoPointHome()">+2</p>
                    <p class="point-adder" onclick="threePointHome()">+3</p>
                </div>
            </div>
            <div>
                <h3 class="side">AWAY</h3>
                <div class="scoreboard">
                    <p class="score" id="away-score">0</p>
                </div>
                <div class="points">
                    <p class="point-adder" onclick="onePointAway()">+1</p>
                    <p class="point-adder" onclick="twoPointAway()">+2</p>
                    <p class="point-adder" onclick="threePointAway()">+3</p>
                </div>
            </div>
        </div>
        <button class="reset-button" onclick="reset()">Reset score</button>
        <script src="index.js"></script>
    </body>
</html>
